<div class="admin-page">
    <div class="page-header">
        <h2>Gradovi</h2>
        <button class="btn-primary" (click)="openAddModal()">
            <span class="btn-icon">➕</span>
            Dodaj grad
        </button>
    </div>



    <app-data-table [data]="cities()" [columns]="columns" [actions]="actions" (onEdit)="openEditModal($event)"
        (onDelete)="openDeleteConfirm($event)">
    </app-data-table>

    <div class="modal-overlay" *ngIf="showModal()" (click)="closeModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <h3>{{ editingCity() ? 'Izmeni grad' : 'Novi grad' }}</h3>
                <button class="close-btn" (click)="closeModal()">✕</button>
            </div>
            <form [formGroup]="cityForm" (ngSubmit)="onSubmit()">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Naziv *</label>
                        <input type="text" formControlName="name" placeholder="npr. Beograd">
                        <div *ngIf="cityForm.get('name')?.touched && cityForm.get('name')?.invalid" class="error">
                            Naziv je obavezan
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Poštanski broj *</label>
                        <input type="text" formControlName="postalCode" placeholder="npr. 11000">
                        <div *ngIf="cityForm.get('postalCode')?.touched && cityForm.get('postalCode')?.invalid"
                            class="error">
                            Poštanski broj je obavezan
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" (click)="closeModal()">Otkaži</button>
                    <button type="submit" class="btn-primary" [disabled]="cityForm.invalid">Sačuvaj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" *ngIf="showDeleteConfirm()" (click)="closeDeleteConfirm()">
        <div class="modal-content modal-small" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <h3>Potvrda brisanja</h3>
                <button class="close-btn" (click)="closeDeleteConfirm()">✕</button>
            </div>
            <div class="modal-body">
                <p>Da li ste sigurni da želite da obrišete grad <strong>{{ deletingCity()?.name }}</strong>?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" (click)="closeDeleteConfirm()">Otkaži</button>
                <button type="button" class="btn-danger" (click)="confirmDelete()">Obriši</button>
            </div>
        </div>
    </div>
</div>
