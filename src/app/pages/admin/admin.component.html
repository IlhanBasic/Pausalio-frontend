<div class="admin-container">
    <div class="admin-header">
        <h1>{{ 'ADMIN.TITLE' | translate }}</h1>
        <p>{{ 'ADMIN.SUBTITLE' | translate }}</p>
    </div>

    <div class="admin-tabs">
        <a routerLink="activity-codes" routerLinkActive="active" class="admin-tab">
            <span class="tab-icon">📋</span>
            {{ 'ADMIN.TABS.ACTIVITY_CODES' | translate }}
        </a>
        <a routerLink="countries" routerLinkActive="active" class="admin-tab">
            <span class="tab-icon">🌍</span>
            {{ 'ADMIN.TABS.COUNTRIES' | translate }}
        </a>
        <a routerLink="cities" routerLinkActive="active" class="admin-tab">
            <span class="tab-icon">🏙️</span>
            {{ 'ADMIN.TABS.CITIES' | translate }}
        </a>
        <a routerLink="users" routerLinkActive="active" class="admin-tab">
            <span class="tab-icon">👥</span>
            {{ 'ADMIN.TABS.USERS' | translate }}
        </a>
        <a routerLink="companies" routerLinkActive="active" class="admin-tab">
            <span class="tab-icon">🏢</span>
            {{ 'ADMIN.TABS.COMPANIES' | translate }}
        </a>
    </div>

    <div class="admin-content">
        <router-outlet></router-outlet>
    </div>
</div>
