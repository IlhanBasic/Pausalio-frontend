<div class="ai-page">
  <div class="ai-header">
    <div class="ai-header__left">
      <div class="ai-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/>
          <circle cx="9" cy="13" r="1" fill="currentColor"/>
          <circle cx="15" cy="13" r="1" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1 class="ai-header__title">Pausalio Asistent</h1>
        <span class="ai-header__subtitle">Tvoj poslovni savetnik</span>
      </div>
    </div>
    <button class="btn-clear" (click)="clearChat()" title="Obriši razgovor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      Obriši razgovor
    </button>
  </div>

  <div class="ai-messages" #messagesContainer>
    @for (msg of messages; track $index) {
      <div class="message" [class.message--user]="msg.role === 'user'" [class.message--assistant]="msg.role === 'assistant'">
        @if (msg.role === 'assistant') {
          <div class="message__avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/>
              <circle cx="9" cy="13" r="1" fill="currentColor"/>
              <circle cx="15" cy="13" r="1" fill="currentColor"/>
            </svg>
          </div>
        }
        <div class="message__body">
          <p class="message__text" [innerHTML]="formatContent(msg.content)"></p>
          <span class="message__time">{{ formatTime(msg.timestamp) }}</span>
        </div>
        @if (msg.role === 'user') {
          <div class="message__avatar message__avatar--user">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        }
      </div>
    }

    @if (isLoading) {
      <div class="message message--assistant">
        <div class="message__avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/>
            <circle cx="9" cy="13" r="1" fill="currentColor"/>
            <circle cx="15" cy="13" r="1" fill="currentColor"/>
          </svg>
        </div>
        <div class="message__body">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="ai-input">
    <div class="ai-input__wrapper">
      <textarea
        [(ngModel)]="inputText"
        (keydown)="onKeyDown($event)"
        placeholder="Postavi pitanje o svom poslovanju..."
        rows="1"
        [disabled]="isLoading"
        class="ai-input__field"
      ></textarea>
      <button
        class="ai-input__send"
        (click)="sendMessage()"
        [disabled]="!inputText.trim() || isLoading"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="ai-input__hint">Enter za slanje &nbsp;·&nbsp; Shift+Enter za novi red</p>
  </div>
</div>
