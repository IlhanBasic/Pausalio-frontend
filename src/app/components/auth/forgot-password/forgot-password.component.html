<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Resetovanje lozinke</h2>
            <p class="subtitle" *ngIf="step() === 1">Unesite email za dobijanje PIN-a</p>
            <p class="subtitle" *ngIf="step() === 2">Unesite novi PIN i lozinku</p>
        </div>

        <!-- Step 1: Request PIN -->
        <form [formGroup]="emailForm" (ngSubmit)="onSendPin()" *ngIf="step() === 1">
            <div class="form-group">
                <label>Email adresa</label>
                <input type="email" formControlName="email" placeholder="primer@email.com">
                <div *ngIf="emailForm.get('email')?.touched && emailForm.get('email')?.invalid" class="error">
                    Validan email je obavezan
                </div>
            </div>



            <button type="submit" class="btn-primary" [disabled]="emailForm.invalid || isLoading()">
                <span *ngIf="isLoading()" class="spinner"></span>
                <span>{{ isLoading() ? 'Šaljem...' : 'Pošalji PIN' }}</span>
            </button>
        </form>

        <!-- Step 2: Reset Password -->
        <form [formGroup]="resetForm" (ngSubmit)="onResetPassword()" *ngIf="step() === 2">
            <div class="form-group">
                <label>PIN kod</label>
                <input type="text" formControlName="pin" placeholder="Unesite PIN iz email-a">
                <div *ngIf="resetForm.get('pin')?.touched && resetForm.get('pin')?.invalid" class="error">
                    PIN je obavezan
                </div>
            </div>

            <div class="form-group">
                <label>Nova lozinka</label>
                <div class="password-input-wrapper">
                    <input [type]="showPassword() ? 'text' : 'password'" formControlName="newPassword"
                        placeholder="Nova lozinka">
                    <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
                        <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['pattern']"
                    class="error">
                    Min 8 karaktera, 1 veliko, 1 malo slovo, 1 broj, 1 spec. znak
                </div>
            </div>

            <div class="form-group">
                <label>Potvrdi novu lozinku</label>
                <div class="password-input-wrapper">
                    <input [type]="showConfirmPassword() ? 'text' : 'password'" formControlName="confirmPassword"
                        placeholder="Potvrdi lozinku">
                    <button type="button" class="password-toggle" (click)="toggleConfirmPasswordVisibility()">
                        <svg *ngIf="!showConfirmPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showConfirmPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched" class="error">
                    Lozinke se ne poklapaju
                </div>
            </div>


            <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isLoading()">
                <span *ngIf="isLoading()" class="spinner"></span>
                <span>{{ isLoading() ? 'Resetovanje...' : 'Promeni lozinku' }}</span>
            </button>
        </form>

        <p class="auth-footer">
            Nazad na <a routerLink="/login">Prijavu</a>
        </p>
    </div>
</div>
