<div class="page">
  <div class="card">

    <!-- Brend oznaka -->
    <div class="brand">
      <div class="brand-dot"></div>
    </div>

    <!-- Stanje učitavanja -->
    <div *ngIf="loading" class="state">
      <div class="spinner-wrap">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <h2>Proveravamo vaš email</h2>
      <p>Samo trenutak dok potvrđujemo<br>vašu email adresu.</p>
    </div>

    <!-- Stanje uspeha -->
    <div *ngIf="success" class="state success">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Email potvrđen</h2>
      <p>Vaš nalog je spreman. Bićete preusmereni<br>na prijavu za trenutak.</p>
      <hr class="divider">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <p class="redirect-note">Preusmeravanje za 3 sekunde...</p>
    </div>

    <!-- Stanje greške -->
    <div *ngIf="!loading && !success" class="state error">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round" style="width:30px;height:30px">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
      <h2>Provera nije uspela</h2>
      <p>{{ errorMessage }}</p>
      <a routerLink="/login" class="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Idi na prijavu
      </a>
    </div>

  </div>
</div>
