<div class="auth-container">
    <div class="auth-card">
        <!-- Left Side - Login Form -->
        <div class="auth-form-section">
            <div class="auth-header">
                <h2>Dobrodošli nazad!</h2>
                <p class="subtitle">Prijavite se na svoj nalog</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label for="email">Email adresa</label>
                    <input id="email" type="email" formControlName="email" placeholder="primer@email.com"
                        autocomplete="email">
                    <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error">
                        Validan email je obavezan
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Lozinka</label>
                    <div class="password-input-wrapper">
                        <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
                            placeholder="Unesite lozinku" autocomplete="current-password">
                        <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
                            aria-label="Toggle password visibility">
                            <!-- Eye Icon (Show) -->
                            <svg *ngIf="!showPassword()" class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <!-- Eye Off Icon (Hide) -->
                            <svg *ngIf="showPassword()" class="eye-off-icon" xmlns="http://www.w3.org/2000/svg"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                    <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error">
                        Lozinka je obavezna
                    </div>
                </div>

                <div class="forgot-password-link">
                    <a routerLink="/forgot-password">Zaboravili ste lozinku?</a>
                </div>

                <div *ngIf="errorMessage()" class="alert alert-error">
                    <span class="alert-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                    </span>
                    {{ errorMessage() }}
                </div>

                <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading()">
                    <span *ngIf="isLoading()" class="spinner"></span>
                    <span>{{ isLoading() ? 'Učitavanje...' : 'Prijavi se' }}</span>
                </button>
            </form>

            <p class="auth-footer">
                Nemaš nalog? <a routerLink="/register">Registruj se</a>
            </p>
        </div>

        <!-- Right Side - Image/Illustration -->
        <div class="auth-image-section">
            <div class="auth-image-content">
                <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <!-- Laptop illustration -->
                    <rect x="100" y="150" width="300" height="200" rx="10" fill="#ffffff" opacity="0.9" />
                    <rect x="110" y="160" width="280" height="160" rx="5" fill="#667eea" opacity="0.2" />
                    <rect x="80" y="350" width="340" height="20" rx="10" fill="#ffffff" opacity="0.8" />
                    <ellipse cx="250" cy="360" rx="60" ry="10" fill="#ffffff" opacity="0.6" />

                    <!-- Lock icon -->
                    <circle cx="250" cy="230" r="30" fill="#ffffff" opacity="0.9" />
                    <rect x="240" y="240" width="20" height="30" rx="3" fill="#667eea" />
                    <path d="M 240 245 Q 240 230 250 230 Q 260 230 260 245" stroke="#667eea" stroke-width="3"
                        fill="none" />

                    <!-- Decorative circles -->
                    <circle cx="150" cy="100" r="15" fill="#ffffff" opacity="0.3" />
                    <circle cx="380" cy="120" r="20" fill="#ffffff" opacity="0.25" />
                    <circle cx="120" cy="380" r="18" fill="#ffffff" opacity="0.3" />
                    <circle cx="370" cy="400" r="12" fill="#ffffff" opacity="0.35" />
                </svg>

                <div class="auth-image-text">
                    <h3>Sigurna prijava</h3>
                    <p>Vaši podaci su zaštićeni end-to-end enkripcijom</p>
                </div>
            </div>
        </div>
    </div>
</div>
